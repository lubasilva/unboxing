version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unboxing_app
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
      - /app/vendor
    networks:
      - unboxing
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: unboxing
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

  nginx:
    image: nginx:alpine
    container_name: unboxing_nginx
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./:/app
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - unboxing
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: unboxing_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: unboxing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - unboxing
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  unboxing:
    driver: bridge

volumes:
  postgres_data:
